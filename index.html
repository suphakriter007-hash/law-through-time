<!DOCTYPE html>

  <meta name="description" content="Law Through Time explores how history shapes law, justice, and society.">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #1c1b1a;
      color: #e8e3dc;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 42px;
      color: #c44536;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 16px;
      color: #aaa;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .articles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 40px;
    }

    .card {
      background: #2a2928;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
      border: 1px solid #444;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #c44536;
    }

    .card h3 {
      color: #e74c3c;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #ccc;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      color: #e74c3c;
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      color: #777;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
